name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: |
          cd universal-coding-tool/backend
          uv pip sync --all-extras
      - name: Run Ruff
        run: |
          cd universal-coding-tool/backend
          ruff .
      - name: Run mypy
        run: |
          cd universal-coding-tool/backend
          mypy app
      - name: Run tests
        run: |
          cd universal-coding-tool/backend
          pytest -m "not vm"
