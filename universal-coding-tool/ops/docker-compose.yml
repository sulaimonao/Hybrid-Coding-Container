version: '3.9'
services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../.env
    volumes:
      - ../backend/app:/app/app
      - ../backend/tests:/app/tests
      - ../ops:/app/ops
      - ../vm/scripts:/app/vm/scripts
    ports:
      - "8000:8000"
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ../.env
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
